<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olympic Connect 2026 — Se connecter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="login-page">

  <main class="auth">
    <section class="auth-form">
      <div class="auth-form-inner">

        <div class="auth-head">
          <h1 class="auth-title">Ravi(e) de vous revoir !</h1>
          <p class="auth-sub">Entrez vos identifiants pour continuer.</p>
        </div>

        <form class="auth-fields" action="index.html" method="get">
          <div class="auth-field">
            <label for="pseudo">Pseudo</label>
            <div class="auth-input">
              <input id="pseudo" name="pseudo" type="text" autocomplete="username" placeholder="Entrez votre pseudo" />
            </div>
            <a class="auth-forgot" href="#">Mot de passe oublié ?</a>
          </div>

          <div class="auth-field">
            <label for="password">Mot de passe</label>
            <div class="auth-input auth-input--pw">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Entrez votre mot de passe" />
              <button type="button" class="auth-pw-toggle" aria-label="Afficher le mot de passe">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5c-5.5 0-9.4 4.6-10.5 7 1.1 2.4 5 7 10.5 7s9.4-4.6 10.5-7C21.4 9.6 17.5 5 12 5zm0 11.5A4.5 4.5 0 1112 7.5a4.5 4.5 0 010 9zm0-2.5a2 2 0 100-4 2 2 0 000 4z"/></svg>
              </button>
            </div>
            <label class="auth-remember"><input type="checkbox" name="remember" /> Se souvenir de moi</label>
          </div>

          <button type="submit" class="auth-submit">Se connecter</button>
        </form>

        <div class="auth-divider"><span>Or</span></div>

        <div class="auth-social">
          <a href="#"><img src="assets/img/icon-google.svg" alt="" /> Connexion avec Google</a>
          <a href="#"><img src="assets/img/icon-apple.svg" alt="" /> Connexion avec Apple</a>
        </div>

        <p class="auth-switch">Vous n'avez pas de compte ? <a href="inscription.html">Inscrivez-vous</a></p>

      </div>
    </section>

    <aside class="auth-image auth-image--login" aria-hidden="true"></aside>
  </main>

  <script>
    // Affichage/masquage des mots de passe
    document.querySelectorAll('.auth-pw-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = btn.parentElement.querySelector('input');
        var show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    });
  </script>

</body>
</html>
